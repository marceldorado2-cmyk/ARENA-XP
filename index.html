<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena SX • Competição • Resultado • Evolução</title>
  <style>
    :root {
      --bg-primário: #0a0a0a;
      --bg-secundário: #111111;
      --bg-card: rgba(255,255,255,0.08);
      --bg-card-hover: rgba(255,255,255,0.12);
      --destaque: #00fff2;
      --brilho-destaque: rgba(0,212,255,0.3);
      --sucesso: #00ff88;
      --aviso: #ffaa00;
      --perigo: #ff4444;
      --texto: #ffffff;
      --texto-silenciado: #888888;
    }
    body {
      background: var(--bg-primário);
      color: var(--texto);
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0; padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 48px auto;
      background: var(--bg-secundário);
      border-radius: 10px;
      box-shadow: 0 0 15px #0008;
      padding: 28px 32px;
    }
    h1 { color: var(--destaque); margin-bottom: 8px; }
    h2 { color: var(--sucesso);}
    button, select, input[type=file] {
      background: var(--bg-card);
      color: var(--texto);
      border: 1px solid var(--bg-card-hover);
      border-radius: 4px;
      padding: 7px 16px;
      margin: 6px 0;
    }
    table {
      width: 100%; margin: 18px 0;
      border-collapse: collapse;
      background: var(--bg-card);
      border-radius: 6px;
      overflow: hidden;
    }
    th, td { font-size: 16px; padding: 8px; text-align: left; }
    th { background: var(--bg-card-hover); color: var(--destaque);}
    tr:nth-child(even){ background: #1a1a1a;}
    .desligado { color: var(--texto-silenciado) !important; text-decoration: line-through;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Arena SX</h1>
    <p>Resultados e Evolução de desempenho.</p>

    <input id="fileInput" type="file" accept=".csv">
    <button id="btnRecarregar">Importar/Atualizar CSV</button>
    <hr>

    <!-- RESUMO/DASHBOARD -->
    <div id="dashboard"></div>
    <!-- RANKING -->
    <div id="ranking"></div>
    <!-- Subequipe/Equipe -->
    <div id="subequipes"></div>
    <!-- Diagnóstico Detalhes -->
    <div id="diagnostico"></div>
  </div>

  <script>
    // ======= CONFIG E UTILS =======
    const estado = {
      csv: [],
      processed: [],
      subequipeConfig: JSON.parse(localStorage.getItem('arena_subequipes')||'{}'),
      competicoes: JSON.parse(localStorage.getItem('arena_competicoes')||'[]'),
      loaded:false,
      errorsCount:0,
      desligados: JSON.parse(localStorage.getItem('arena_desligados')||'[]')
    }

    function normalizarNome(nome) {
      return (nome || '')
        .toString()
        .trim()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/\s+/g,' ')
        .toUpperCase()
    }

    // Lista mestre dos profissionais desligados
    const DESLIGADOS_PADRAO = [
      'LUAN DOS SANTOS S. FIRMINO',
      'SERGIO CEZAR DA SILVA',
      'TASSIANE RENATA MUGNOLI',
      'IGOR SENA DOS SANTOS',
      'ROBSON ALLAN DO NASCIMENTO',
      'FRANCISCO HERMESON BATISTA DOS',
      'AMANDA CONCEICAO DA COSTA',
      'AGNALDO FIRMINO JUNIOR',
      'NICK VITORIA',
      'MARCELO HENRIQUE DE CAMPOS',
      // Liners/Closers citados
      'JESSICA DE LIMA RIBEIRO',
      'WILLIAN LUIZ DA SILVA XAVIER',
      'FABIO BRANCALION DOS ANJOS',
      'GUSTAVO CARDOSO WEBER',
      'ENZO VINICIUS',
      'MEG LOIOLA',
      'GABRIELLA FURTADO',
      'GUILHERME SANTOS BATISTA',
      'SILVIA REGINA',
      'SARA DE JESUS SILVA',
      'ALEX FONSECA VIVIAN',
      'RAMON SILVEIRA PINHEIRO',
      'FABRICIO LELIS BIGNARDI',
      'MARCOS ANTONIO DE MEIRA',
      'ANTONIO CARVALHO',
      'CLARA PINHEIRO',
      'MARCIO ALFAIA',
      'MARCIO DENNEY',
      'SN'
    ].map(normalizarNome)

    function garantirDesligadosPadrao() {
      const atual = new Set((estado.desligados||[]).map(normalizarNome))
      DESLIGADOS_PADRAO.forEach(n => atual.add(n))
      estado.desligados = [...atual].sort()
      localStorage.setItem('arena_desligados', JSON.stringify(estado.desligados))
    }

    function estaDesligado(nomeProfissional) {
      const n = normalizarNome(nomeProfissional)
      if(!n) return false
      return (estado.desligados||[]).map(normalizarNome).includes(n)
    }

    // ========== CSV FILE READER ============
    document.getElementById('fileInput').addEventListener('change', carregarCSV)
    document.getElementById('btnRecarregar').addEventListener('click', carregarCSV)

    function carregarCSV() {
      const file = document.getElementById('fileInput').files[0]
      if (!file) {
        alert("Escolha um arquivo CSV válido.")
        return
      }
      const reader = new FileReader()
      reader.onload = function(e) {
        const texto = e.target.result
        estado.csv = parseCSV(texto)
        processarDados()
      }
      reader.readAsText(file)
    }

    // ========== PARSE CSV (básico, para demo) ============
    function parseCSV(text) {
      const linhas = text.trim().split('\n');
      const cabecalho = linhas[0].split(',').map(h=>h.trim());
      return linhas.slice(1).map((linha) => {
        const partes = linha.split(',');
        let obj = {};
        cabecalho.forEach((chave,i)=>{ obj[chave]=partes[i]||"" })
        return obj;
      });
    }

    // ======= PROCESSAMENTO DE DADOS COM FILTRO =======
    function processarDados() {
      if(!estado.csv.length) return;
      garantirDesligadosPadrao()

      const base = estado.csv.map(l=>{
        const equipe=obterEquipe(l)
        const subequipe=equipe.tipo==='Promotor de marketing'?getSubequipe(equipe.nome):''
        return {
          ...l,
          equipe:equipe.tipo,
          profissional:equipe.nome,
          subequipe:subequipe,
          valorVendido:parseValorBR(l['Valor vendido']),
          cidade:l['Cidade']
        }
      })

      // FILTRO DOS DESLIGADOS
      estado.processed = base.filter(r => !estaDesligado(r.profissional))
      atualizarDashboard()
      atualizarRanking()
      atualizarSubequipeUI()
      atualizarDiagnosticoDetalhes()
    }

    // ======= FUNÇÕES DE ATUALIZAÇÃO (exemplo simples para demo) =======
    function atualizarRanking() {
      // Exemplo: simples tabela de ranking por valor vendido
      const arr = estado.processed.slice().sort((a,b)=>b.valorVendido-a.valorVendido)
      let html = "<h2>Ranking (Apenas Ativos)</h2><table><tr><th>Profissional</th><th>Valor vendido</th></tr>"
      arr.forEach(l => {
        html += `<tr><td>${l.profissional}</td><td>R$ ${l.valorVendido.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td></tr>`
      })
      html += "</table>"
      document.getElementById('ranking').innerHTML = html
    }
    function atualizarDashboard() {
      // Exemplo: valor total
      let total = estado.processed.reduce((soma, r) => soma + r.valorVendido, 0)
      document.getElementById('dashboard').innerHTML =
        `<h2>Dashboard</h2>
         <b>Total vendido (Ativos):</b> R$ ${(total).toLocaleString('pt-BR', {minimumFractionDigits:2})}`
    }
    function atualizarSubequipeUI() {
      // Mostra lista das subequipes, só dos ativos
      let grupos = {}
      estado.processed.forEach(r => {
        if(!grupos[r.subequipe]) grupos[r.subequipe]=[]
        grupos[r.subequipe].push(r.profissional)
      })
      let html = "<h2>Subequipes (Apenas Ativos)</h2>"
      for(const sub in grupos) {
        html += `<b>${sub||"(Sem subequipe)"}</b>: ${grupos[sub].join(", ")}<br>`
      }
      document.getElementById('subequipes').innerHTML = html
    }
    function atualizarDiagnosticoDetalhes() {
      // Diagnóstico simples
      document.getElementById('diagnostico').innerHTML =
        `<h2>Diagnóstico</h2>
         Processados: ${estado.processed.length} registros<br>
         Total original: ${estado.csv.length} registros`
    }

    // ======= Funções auxiliares =======
    function obterEquipe(linha) {
      // Exemplo bobo (ajuste para teu caso)
      return {
        tipo: linha['Equipe'] || '',
        nome: linha['Nome'] || ''
      }
    }
    function getSubequipe(nome) {
      return estado.subequipeConfig[normalizarNome(nome)]||''
    }
    function parseValorBR(valor) {
      if(!valor) return 0
      return parseFloat(valor.replace(/\./g,'').replace(',','.'))||0
    }
  </script>
</body>
</html>
